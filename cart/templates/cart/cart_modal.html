<div id="cart-modal" class="cart-modal">
    <div class="h-full flex flex-col">
        <!-- Шапка корзины -->
        <div class="flex justify-between items-center p-6 border-b">
            <h1 class="text-2xl font-bold">КОРЗИНА (<span id="cart-count">{{ cart.total_items }}</span>)</h1>
            <button onclick="closeCart()" class="text-2xl hover:text-gray-600">&times;</button>
        </div>

        <!-- Товары в корзине -->
        <div class="flex-1 overflow-y-auto p-6">
            <div id="cart-items" class="space-y-8">
                {% for item in cart_items %}
                    {% include 'cart/cart_item.html' %}
                {% empty %}
                    <div class="text-center py-20 text-gray-500">
                        <p class="text-lg mb-4">Ваша корзина пуста</p>
                        <button onclick="closeCart()" class="text-sm underline hover:text-gray-700">Продолжить покупки</button>
                    </div>
                {% endfor %}
            </div>
        </div>

        <!-- Нижняя часть корзины -->
        <div id="cart-summary" class="border-t p-6">
            {% if cart_items %}
                {% include 'cart/cart_summary.html' %}
            {% else %}
                <div class="text-center text-gray-500">
                    <p>Ваша корзина пуста</p>
                </div>
            {% endif %}
        </div>
    </div>
</div>

<!-- Оверлей -->
<div id="cart-overlay" class="cart-overlay"></div>

<style>
    /* Оверлей */
    .cart-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        z-index: 40;
        opacity: 0;
        visibility: hidden;
        transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    .cart-overlay.open {
        opacity: 1;
        visibility: visible;
    }

    /* Модальное окно корзины */
    .cart-modal {
        position: fixed;
        top: 0;
        right: 0;
        height: 100vh;
        width: 100%;
        max-width: 28rem;
        background: white;
        box-shadow: -4px 0 20px rgba(0, 0, 0, 0.15);
        z-index: 50;
        transform: translateX(100%);
        transition: transform 0.3s ease-in-out;
    }
    .cart-modal.open {
        transform: translateX(0);
    }
</style>

<script>
    (function() {
        const modal = document.querySelector('.cart-modal');
        const overlay = document.querySelector('.cart-overlay');
        
        // Сразу показываем корзину (она только что загрузилась)
        if (modal && overlay) {
            // Форсируем reflow
            modal.offsetHeight;
            modal.classList.add('open');
            overlay.classList.add('open');
        }
    })();

    function closeCart() {
        const modal = document.querySelector('.cart-modal');
        const overlay = document.querySelector('.cart-overlay');
        
        if (modal) modal.classList.remove('open');
        if (overlay) overlay.classList.remove('open');
        
        setTimeout(() => {
            const container = document.getElementById('cart-container');
            if (container) container.innerHTML = '';
        }, 300);
    }

    // Закрытие по клику вне модалки
    document.addEventListener('click', function(e) {
        const modal = document.querySelector('.cart-modal');
        if (modal && modal.classList.contains('open') && !modal.contains(e.target)) {
            closeCart();
        }
    });

    // Закрытие по Escape
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') closeCart();
    });
</script>
